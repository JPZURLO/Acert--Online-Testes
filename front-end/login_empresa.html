<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
    <link rel="stylesheet" href="./css/login.css">
    <link rel="stylesheet" href="./css/public-i18n.css?v=1">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <img src="./assets/images/iconeUser.png" alt="Ícone do Usuário" class="user-icon">
            <p>LOGIN INSTITUIÇÃO</p>
            <form id="login-form" method="post" action="/login_empresa">
                <input type="text" id="CNPJ" name="cnpj" placeholder="CNPJ" class="input-field">
                <input type="password" id="senha" name="senha" placeholder="Senha" class="input-field">
                <div class="checkbox-container">
                    <input type="checkbox" id="mostrar-senha">
                    <label for="mostrar-senha">Mostrar Senha</label>
                </div>
                <div id="error-message"></div>  <button type="submit" class="login-button">Entrar</button>
            </form>
            <a href="EsqueciSenha.html" class="esqueci-senha">Esqueci a Senha</a>
        </div>
    </div>
    <script src="./js/scriptMostrarSenha.js?v=1"></script>
    <script src="./js/scriptcnpj.js"></script>

    <script src="./js/scriptLoginEmpresa.js?v=3"></script>
    <script src="./js/public-i18n.js?v=1"></script>

</body>
</html>
