<!DOCTYPE html>
<html>
<head>
  <title>Tela de Login</title>
  <link rel="stylesheet" href="./css/login.css">
  
</head>
<body>
  <div class="container">
    <div class="login-box">
      <img src="./assets/images/iconeUser.png" alt="Ícone do Usuário" class="user-icon">
      <h2>Esqueci a Senha</h2>
      <p>Digite seu endereço de e-mail para redefinir sua senha.</p>
      <input type="email" placeholder="E-mail" class="input-field">
      <button class="reset-button">Redefinir Senha</button>
      
    </div>
  </div>

</body>
</html>
