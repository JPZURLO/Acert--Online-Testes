<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ativação segura do acesso empresarial ao Online Teste.">
  <title>Ativar acesso | Online Teste</title>
  <link rel="shortcut icon" href="./assets/images/Logo.ico" type="image/x-icon">
  <link rel="stylesheet" href="./css/company-activation.css?v=1">
  <link rel="stylesheet" href="./css/public-i18n.css?v=1">
  <style>*,*:before,*:after{box-sizing:border-box}[hidden]{display:none!important}</style>
</head>
<body class="activation-page">
  <main class="activation-card">
    <a class="activation-brand" href="./index.html"><img src="./assets/images/Logo_com_Slogan (sem fundo).png" alt="Online Teste"></a>
    <span class="activation-eyebrow">ATIVAÇÃO SEGURA</span>
    <h1 id="activation-title">Crie sua senha</h1>
    <p id="activation-description">Validando seu convite de acesso...</p>
    <form class="activation-form" id="activation-form" hidden>
      <label>Nova senha
        <input id="activation-password" type="password" minlength="12" maxlength="128" autocomplete="new-password" required>
      </label>
      <label>Confirme a nova senha
        <input id="activation-password-confirmation" type="password" minlength="12" maxlength="128" autocomplete="new-password" required>
      </label>
      <span class="activation-hint">Use pelo menos 12 caracteres, com letra maiúscula, minúscula e número.</span>
      <p class="activation-message" id="activation-message" role="status" aria-live="polite"></p>
      <button id="activation-submit" type="submit">Ativar meu acesso</button>
    </form>
    <a class="activation-login" id="activation-login" href="./login_empresa.html" hidden>Ir para o login da empresa</a>
  </main>
  <script src="./js/company-activation.js?v=1"></script>
  <script src="./js/public-i18n.js?v=1"></script>
</body>
</html>
